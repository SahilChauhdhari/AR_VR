<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Applications of AI in Virtual Reality — Intelligent Systems</title>
  <meta name="description"
    content="An interactive 3D presentation exploring the convergence of AI and VR — Spatial Intelligence, Intelligent NPCs, Procedural Worlds, and more." />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cyan: #0ea5e9;
      --violet: #a78bfa;
      --amber: #f0a500;
      --emerald: #34d399;
      --rose: #f472b6;
      --bg: #060610;
      --glass: rgba(5, 8, 22, 0.82);
      --glass-border: rgba(255, 255, 255, 0.07);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    #canvas3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Transition ──────────────────────────────────── */
    #transition {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    #transition.active {
      opacity: 1;
    }

    /* ── Loader ──────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.9s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 4.5vw, 48px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    .loader-bar-track {
      width: min(300px, 75vw);
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      overflow: hidden;
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      border-radius: 4px;
      transition: width 0.3s;
    }

    .loader-sub {
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
    }

    /* ── Top Bar ─────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      pointer-events: none;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    #slide-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ── Progress Bar ────────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 110;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--violet), var(--amber));
      transition: width 0.4s ease;
    }

    /* ── Nav Dots ────────────────────────────────────── */
    #nav {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: all;
    }

    .ndot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .ndot::after {
      content: attr(data-tip);
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .ndot:hover::after {
      opacity: 1;
    }

    .ndot.on {
      background: var(--cyan);
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(14, 165, 233, 0.5);
      transform: scale(1.35);
    }

    /* ── Content Panel ───────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      width: min(520px, calc(100vw - 60px));
      pointer-events: none;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #panel.show {
      opacity: 1;
      transform: translateY(0);
    }

    #panel.expanded {
      top: 50%;
      left: 50%;
      bottom: auto;
      width: calc(100vw - 80px);
      height: calc(100vh - 80px);
      transform: translate(-50%, -50%) !important;
    }

    #panel.expanded .pcard {
      height: 100%;
      max-height: 100%;
    }

    #panel.expanded .ptitle {
      font-size: clamp(32px, 4vw, 56px);
      margin-bottom: 16px;
    }

    #panel.expanded .psubtitle {
      font-size: clamp(18px, 2vw, 32px);
      margin-bottom: 20px;
    }

    #panel.expanded .pdesc,
    #panel.expanded .csbox-text {
      font-size: clamp(16px, 1.8vw, 24px);
      line-height: 1.8;
    }

    #panel.expanded .pbullets li {
      font-size: clamp(16px, 1.8vw, 24px);
      padding: 6px 0 6px 24px;
      margin-bottom: 8px;
    }

    #panel.expanded .pbullets li::before {
      font-size: 16px;
      top: 10px;
    }

    #panel.expanded .csbox {
      padding: 16px 24px;
      margin: 16px 0;
    }

    #panel.expanded .csbox-title {
      font-size: clamp(16px, 1.8vw, 24px);
      margin-bottom: 12px;
    }

    #panel.expanded .ptag {
      font-size: clamp(12px, 1.2vw, 18px);
      margin-bottom: 16px;
    }

    #panel.expanded .ptechs {
      margin-top: 24px;
      gap: 12px;
    }

    #panel.expanded .ptag-chip {
      font-size: clamp(10px, 1.2vw, 16px);
      padding: 6px 16px;
    }

    #panel.expanded .pquote {
      font-size: clamp(16px, 1.8vw, 24px);
      margin-top: 24px;
      padding-left: 20px;
    }

    #panel.expanded .members {
      margin: 24px 0;
      gap: 16px;
    }

    #panel.expanded .mcard {
      padding: 16px 24px;
    }

    #panel.expanded .mname {
      font-size: clamp(16px, 1.8vw, 24px);
      margin-bottom: 8px;
    }

    #panel.expanded .mid {
      font-size: clamp(12px, 1.2vw, 18px);
    }

    #panel.expanded .cgrid {
      gap: 16px;
      margin: 24px 0;
    }

    #panel.expanded .cgrid-item {
      padding: 24px 16px;
    }

    #panel.expanded .cgrid-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    #panel.expanded .cgrid-label {
      font-size: clamp(14px, 1.6vw, 22px);
      margin-bottom: 8px;
    }

    #panel.expanded .cgrid-desc {
      font-size: clamp(12px, 1.2vw, 18px);
      line-height: 1.6;
    }

    #panel.expanded .pfin {
      font-size: clamp(12px, 1.2vw, 18px);
      margin-top: 24px;
    }

    .pcard {
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(1.3);
      -webkit-backdrop-filter: blur(22px) saturate(1.3);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 20px 24px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      position: relative;
    }

    .pcard::-webkit-scrollbar {
      width: 3px;
    }

    .pcard::-webkit-scrollbar-track {
      background: transparent;
    }

    .pcard::-webkit-scrollbar-thumb {
      background: rgba(14, 165, 233, 0.3);
      border-radius: 3px;
    }

    /* ── Expand Button ───────────────────────────────── */
    #expand-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: rgba(14, 165, 233, 0.1);
      border: 1px solid rgba(14, 165, 233, 0.25);
      border-radius: 7px;
      color: var(--cyan);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      pointer-events: all;
      transition: all 0.25s ease;
      z-index: 10;
    }

    #expand-btn:hover {
      background: rgba(14, 165, 233, 0.2);
      border-color: rgba(14, 165, 233, 0.5);
      box-shadow: 0 0 12px rgba(14, 165, 233, 0.25);
      transform: scale(1.1);
    }

    #panel.expanded #expand-btn {
      transform: rotate(45deg);
    }

    /* Backdrop */
    #expand-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #expand-backdrop.active {
      opacity: 1;
      pointer-events: all;
    }

    .ptag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .ptag-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      animation: pdot 1.8s ease-in-out infinite;
    }

    @keyframes pdot {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .ptitle {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(18px, 3vw, 32px);
      line-height: 1.12;
      margin-bottom: 4px;
    }

    .psubtitle {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: clamp(11px, 1.5vw, 15px);
      line-height: 1.3;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.5);
    }

    .pdesc {
      font-weight: 300;
      font-size: clamp(11px, 1.2vw, 13px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.5);
    }

    .pdesc em {
      font-style: normal;
      color: var(--cyan);
    }

    .pdesc strong {
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }

    .pbullets {
      margin: 8px 0 4px;
      padding: 0;
      list-style: none;
    }

    .pbullets li {
      font-size: clamp(10px, 1.1vw, 12px);
      color: rgba(255, 255, 255, 0.5);
      padding: 3px 0 3px 14px;
      position: relative;
      line-height: 1.6;
    }

    .pbullets li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--cyan);
      font-size: 10px;
    }

    .pbullets li em {
      font-style: normal;
      color: var(--cyan);
    }

    .pbullets li strong {
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
    }

    .ptechs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .ptag-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 1.5px;
      padding: 3px 9px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-transform: uppercase;
    }

    /* ── Member cards (intro) ────────────────────────── */
    .members {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 14px 0 8px;
      flex-wrap: wrap;
    }

    .mcard {
      flex: 1;
      min-width: 110px;
      background: rgba(14, 165, 233, 0.06);
      border: 1px solid rgba(14, 165, 233, 0.2);
      border-radius: 9px;
      padding: 10px 12px;
      text-align: center;
    }

    .mname {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .mid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 2px;
    }

    /* ── Case Study boxes ────────────────────────────── */
    .csbox {
      background: rgba(14, 165, 233, 0.04);
      border-left: 3px solid var(--amber);
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin: 8px 0;
    }

    .csbox-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      color: var(--amber);
      margin-bottom: 4px;
    }

    .csbox-text {
      font-size: 11px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.5);
    }

    .csbox-text em {
      font-style: normal;
      color: var(--cyan);
    }

    /* ── Quote ────────────────────────────────────────── */
    .pquote {
      font-style: italic;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 10px;
      padding-left: 12px;
      border-left: 2px solid rgba(14, 165, 233, 0.3);
      line-height: 1.5;
    }

    .pquote em {
      font-style: normal;
      color: var(--cyan);
    }

    /* ── Conclusion Grid ─────────────────────────────── */
    .cgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 10px 0;
    }

    .cgrid-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .cgrid-icon {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .cgrid-label {
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .cgrid-desc {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.35);
      line-height: 1.3;
    }

    /* ── Bottom Prompt ───────────────────────────────── */
    #bottom-prompt {
      position: fixed;
      bottom: 20px;
      right: 60px;
      z-index: 100;
      pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.25);
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.25
      }

      50% {
        opacity: 0.55
      }
    }

    .kbtn {
      padding: 2px 7px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 3px;
      font-size: 7px;
    }

    .divider {
      width: 28px;
      height: 1px;
      background: rgba(14, 165, 233, 0.35);
      margin: 10px 0;
    }

    .pfin {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.2);
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      #nav {
        right: 8px;
      }

      .pcard {
        padding: 14px 16px;
      }

      .cgrid {
        grid-template-columns: repeat(2, 1fr);
      }

      .members {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <canvas id="canvas3d"></canvas>
  <div id="transition"></div>
  <div id="progress-bar"></div>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-title">Applications of AI in VR</div>
    <div class="loader-bar-track">
      <div class="loader-bar" id="lbar"></div>
    </div>
    <div class="loader-sub" id="ltext">Initializing…</div>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">◉</div>
      <span>AI <span style="color:var(--cyan)">× VR</span></span>
    </div>
    <div id="slide-counter">01 / 13</div>
  </div>

  <!-- Nav dots -->
  <div id="nav"></div>

  <!-- Content panel -->
  <div id="panel">
    <div class="pcard" id="pcard"></div>
  </div>
  <div id="expand-backdrop"></div>

  <!-- Bottom prompt -->
  <div id="bottom-prompt">
    <span class="kbtn">←→</span> Navigate &nbsp;
    <span class="kbtn">DRAG</span> Rotate &nbsp;
    <span class="kbtn">SCROLL</span> Zoom
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    'use strict';

    /* ══════════════════════════════════════════════════════════
       RENDERER + SCENE + CAMERA
    ══════════════════════════════════════════════════════════ */
    const cvs = document.getElementById('canvas3d');
    const R = new THREE.WebGLRenderer({ canvas: cvs, antialias: true, powerPreference: 'high-performance' });
    R.setPixelRatio(Math.min(devicePixelRatio, 2));
    R.setSize(innerWidth, innerHeight);
    R.shadowMap.enabled = true;
    R.shadowMap.type = THREE.PCFSoftShadowMap;
    R.outputEncoding = THREE.sRGBEncoding;
    R.toneMapping = THREE.ACESFilmicToneMapping;
    R.toneMappingExposure = 1.4;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060610);
    scene.fog = new THREE.Fog(0x060610, 60, 200);

    const cam = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 800);
    cam.position.set(0, 6, 22);

    const ctrl = new THREE.OrbitControls(cam, cvs);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.06;
    ctrl.enablePan = false;
    ctrl.minDistance = 6;
    ctrl.maxDistance = 50;
    ctrl.maxPolarAngle = Math.PI * 0.52;
    ctrl.autoRotate = true;
    ctrl.autoRotateSpeed = 0.5;

    /* ── Lights ────────────────────────────────────────── */
    scene.add(new THREE.AmbientLight(0x222244, 0.4));
    scene.add(new THREE.HemisphereLight(0x4488cc, 0x112211, 0.5));
    const sunL = new THREE.DirectionalLight(0xffeed8, 4);
    sunL.position.set(40, 60, 30);
    sunL.castShadow = true;
    sunL.shadow.mapSize.set(1024, 1024);
    sunL.shadow.camera.far = 200;
    sunL.shadow.camera.left = sunL.shadow.camera.bottom = -60;
    sunL.shadow.camera.right = sunL.shadow.camera.top = 60;
    scene.add(sunL);
    scene.add(new THREE.DirectionalLight(0x6688aa, 0.6).translateX(-30).translateY(20));
    const ptA = new THREE.PointLight(0x0ea5e9, 8, 60);
    const ptB = new THREE.PointLight(0xf0a500, 5, 50);
    scene.add(ptA, ptB);

    /* ── Helpers ───────────────────────────────────────── */
    const mk = (g, m) => new THREE.Mesh(g, m);
    const mS = (c, r = .65, mt = 0) => new THREE.MeshStandardMaterial({ color: c, roughness: r, metalness: mt });
    const mG = (c, ei = 2) => new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: ei, roughness: .4, metalness: .1 });
    const lerp = (a, b, t) => a + t * (b - a);

    /* ── Perlin ────────────────────────────────────────── */
    const _p = (() => { const p = []; for (let i = 0; i < 256; i++) p[i] = i; for (let i = 255; i > 0; i--) { const j = ~~(Math.random() * (i + 1));[p[i], p[j]] = [p[j], p[i]]; } return [...p, ...p]; })();
    function nF(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function nL(t, a, b) { return a + t * (b - a); }
    function nG(h, x, y) { const u = h < 8 ? x : y, v = h < 4 ? y : 0; return ((h & 1) ? -u : u) + ((h & 2) ? -v : v); }
    function noise(x, y) { const xi = ~~x & 255, yi = ~~y & 255, xf = x - ~~x, yf = y - ~~y; const u = nF(xf), v = nF(yf); const aa = _p[_p[xi] + yi], ab = _p[_p[xi] + yi + 1], ba = _p[_p[xi + 1] + yi], bb = _p[_p[xi + 1] + yi + 1]; return nL(v, nL(u, nG(aa, xf, yf), nG(ba, xf - 1, yf)), nL(u, nG(ab, xf, yf - 1), nG(bb, xf - 1, yf - 1))); }
    function octN(x, y, o = 5) { let v = 0, a = 1, f = 1, m = 0; for (let i = 0; i < o; i++) { v += noise(x * f, y * f) * a; m += a; a *= .5; f *= 2; } return v / m; }

    /* ── Stars ─────────────────────────────────────────── */
    (() => {
      const N = 2500, g = new THREE.BufferGeometry(), p = new Float32Array(N * 3);

    let cur = 0;
    const navEl = document.getElementById('nav');
    const panelEl = document.getElementById('panel');
    const pcardEl = document.getElementById('pcard');
    const counterEl = document.getElementById('slide-counter');
    const progressEl = document.getElementById('progress-bar');
    const transEl = document.getElementById('transition');

    // Build nav dots
    const dotLabels = ['INTRO', 'AI 2026', 'HEALTH', 'SEPSIS', 'NPCs', 'CASE 02', 'WORLDS', 'CASE 03', 'TRACKING', 'DLSS', 'OMNIVERSE', 'CONCLUSION', 'FUTURE'];
    SLIDES.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'ndot' + (i === 0 ? ' on' : '');
      d.setAttribute('data-tip', dotLabels[i]);
      d.addEventListener('click', () => goSlide(i));
      navEl.appendChild(d);
    });

    function goSlide(idx) {
      if (idx === cur || idx < 0 || idx >= SLIDES.length) return;
      const s = SLIDES[idx];
      const prevScene = SLIDES[cur].sceneIdx;
      const needSceneSwap = s.sceneIdx !== prevScene;

      // Collapse if expanded
      collapsePanel();

      // Fade panel out
      panelEl.classList.remove('show');

      if (needSceneSwap) {
        transEl.classList.add('active');
        setTimeout(() => {
          sceneGroups[prevScene].visible = false;
          sceneGroups[s.sceneIdx].visible = true;
          applyCam(s);
          cur = idx;
          updateUI();
          setTimeout(() => {
            transEl.classList.remove('active');
            setTimeout(() => panelEl.classList.add('show'), 200);
          }, 150);
        }, 450);
      } else {
        applyCam(s);
        cur = idx;
        updateUI();
        setTimeout(() => panelEl.classList.add('show'), 250);
      }
    }

    function applyCam(s) {
      gsap.to(cam.position, { x: s.cam.pos[0], y: s.cam.pos[1], z: s.cam.pos[2], duration: 1.2, ease: 'power2.inOut' });
      gsap.to(ctrl.target, { x: s.cam.tgt[0], y: s.cam.tgt[1], z: s.cam.tgt[2], duration: 1.2, ease: 'power2.inOut' });
    }

    function updateUI() {
      const s = SLIDES[cur];
      pcardEl.innerHTML = '<button id="expand-btn" title="Expand slide">⛶</button>' + s.html;
      counterEl.textContent = String(cur + 1).padStart(2, '0') + ' / ' + String(SLIDES.length).padStart(2, '0');
      progressEl.style.width = ((cur / (SLIDES.length - 1)) * 100) + '%';
      document.querySelectorAll('.ndot').forEach((d, i) => d.classList.toggle('on', i === cur));
      // Bind expand btn
      document.getElementById('expand-btn')?.addEventListener('click', toggleExpand);
    }

    // Expand/collapse panel
    const backdropEl = document.getElementById('expand-backdrop');
    let isExpanded = false;

    function toggleExpand() {
      isExpanded = !isExpanded;
      panelEl.classList.toggle('expanded', isExpanded);
      backdropEl.classList.toggle('active', isExpanded);
    }

    function collapsePanel() {
      if (isExpanded) {
        isExpanded = false;
        panelEl.classList.remove('expanded');
        backdropEl.classList.remove('active');
      }
    }

    backdropEl.addEventListener('click', collapsePanel);

    // Keyboard
    window.addEventListener('keydown', e => {
      if (e.key === 'Escape') { collapsePanel(); return; }
      if (isExpanded) return; // Don't navigate while expanded
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goSlide(Math.min(cur + 1, SLIDES.length - 1)); }
      if (e.key === 'ArrowLeft') goSlide(Math.max(cur - 1, 0));
      const n = parseInt(e.key);
      if (n >= 1 && n <= 9) goSlide(n - 1);
      if (e.key === '0') goSlide(9);
    });

    /* ══════════════════════════════════════════════════════════
       ANIMATION LOOP
    ══════════════════════════════════════════════════════════ */
    const skyC = new THREE.Color(), fogC = new THREE.Color();
    let tick = 0;

    function animate() {
      requestAnimationFrame(animate);
      T = Date.now() * .001;
      tick++;
      ctrl.update();

      // Accent lights
      ptA.position.set(cam.position.x + 5, cam.position.y + 3, cam.position.z - 3);
      ptB.position.set(cam.position.x - 4, cam.position.y + 1, cam.position.z + 4);

      // Sky/fog
      if (tick % 3 === 0) {
        const s = SLIDES[cur];
        skyC.setHex(s.sky); scene.background.lerp(skyC, .06);
        fogC.setHex(s.fog); scene.fog.color.lerp(fogC, .06);
        scene.fog.far += (s.fogFar - scene.fog.far) * .06;
        scene.fog.near = scene.fog.far * .3;
      }

      // Scene animations
      const sg = sceneGroups[SLIDES[cur].sceneIdx];
      if (!sg) { R.render(scene, cam); return; }
      const si = SLIDES[cur].sceneIdx;

      if (si === 0) { // VR Core
        if (sg.userData.core) {
          sg.userData.core.rotation.y = T * .15;
          sg.userData.core.material.emissiveIntensity = .4 + Math.sin(T * 1.5) * .3;
        }
        sg.userData.rings?.forEach(r => { if (r.userData.ax === 0) r.rotation.y += r.userData.spd; else r.rotation.x += r.userData.spd; });
        sg.userData.nodes?.forEach(n => {
          n.userData.a += n.userData.spd;
          n.position.x = Math.cos(n.userData.a) * n.userData.r;
          n.position.z = Math.sin(n.userData.a) * n.userData.r;
          n.position.y = n.userData.yO + Math.sin(T * .8 + n.userData.a) * .4;
          n.material.emissiveIntensity = 2 + Math.sin(T * 3 + n.userData.a * 4) * 2;
        });
      }
      if (si === 1) { // NPC
        if (sg.userData.body) {
          sg.userData.body.position.y = 2.5 + Math.sin(T * .55) * .1;
          sg.userData.body.rotation.y = Math.sin(T * .3) * .15;
        }
        sg.userData.bubbles?.forEach((b, i) => {
          b.userData.ph += .012;
          b.position.x = Math.cos(b.userData.ph) * b.userData.r;
          b.position.z = Math.sin(b.userData.ph) * b.userData.r;
          b.position.y = 4 + Math.sin(T * .8 + i) * .5;
          b.material.emissiveIntensity = 2 + Math.sin(T * 2 + i * 2) * 1.5;
        });
        sg.children.forEach(c => {
          if (c.userData?.a !== undefined) {
            c.userData.a += c.userData.spd * .01;
            c.position.set(Math.cos(c.userData.a) * c.userData.r, 3 + Math.sin(T * .5 + c.userData.a) * .4, Math.sin(c.userData.a) * c.userData.r);
          }
        });
      }
      if (si === 2) { // Cathedral
        if (sg.userData.cathedral) {
          sg.userData.cathedral.rotation.y = Math.sin(T * 0.4) * 0.05;
        }
      }
      if (si === 3) { // AI Car Model
        if (sg.userData.car) {
          sg.userData.car.position.y = Math.sin(T * 8) * 0.05;
          sg.userData.car.rotation.z = Math.sin(T * 4) * 0.02;
          sg.userData.car.rotation.x = Math.sin(T * 2) * 0.01;
        }
        sg.userData.scanRings?.forEach(r => {
          r.position.z = Math.sin(T * 1.2) * 3;
        });
        if (sg.userData.speedPts) {
          sg.userData.speedPts.position.z += 0.8;
          if (sg.userData.speedPts.position.z > 20) {
            sg.userData.speedPts.position.z = 0;
          }
        }
      }
      if (si === 4) { // Conclusion
        if (sg.userData.core) {
          sg.userData.core.rotation.y = T * .28;
          sg.userData.core.material.emissiveIntensity = .9 + Math.sin(T * 1.8) * .4;
        }
        sg.userData.tori?.forEach((t, i) => {
          t.rotation.y += .007 + i * .003;
          t.rotation.x += .004 + i * .002;
        });
        sg.rotation.y = T * .018;
      }
      if (si === 5) { // Surgery Room
        if (sg.userData.ecg) {
          sg.userData.ecg.scale.y = 0.8 + Math.sin(T * 8) * 0.4;
        }
        if (sg.userData.lightGrp) {
          sg.userData.lightGrp.position.y = Math.sin(T * 0.5) * 0.2;
        }
      }

      R.render(scene, cam);
    }

    /* ── Resize ────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      cam.aspect = innerWidth / innerHeight;
      cam.updateProjectionMatrix();
      R.setSize(innerWidth, innerHeight);
    });

    /* ── Loader ────────────────────────────────────────── */
    const lbar = document.getElementById('lbar');
    const ltext = document.getElementById('ltext');
    const steps = ['Initializing…', 'Building scenes…', 'Loading NPCs…', 'Generating terrain…', 'Preparing eye tracking…', 'Rendering conclusion…', 'Ready!'];
    let lp = 0;
    const li = setInterval(() => {
      lp += 10 + Math.random() * 8;
      if (lp > 100) lp = 100;
      lbar.style.width = lp + '%';
      ltext.textContent = steps[Math.min(~~(lp / 15), steps.length - 1)];
      if (lp >= 100) {
        clearInterval(li);
        setTimeout(() => {
          document.getElementById('loader').classList.add('hidden');
          updateUI();
          panelEl.classList.add('show');
          gsap.from('#topbar', { y: -20, opacity: 0, duration: .8, delay: .2, ease: 'power2.out' });
          gsap.from('#nav', { x: 20, opacity: 0, duration: .8, delay: .4, ease: 'power2.out' });
        }, 400);
      }
    }, 160);

    /* ── Init ──────────────────────────────────────────── */
    sceneGroups[0].visible = true;
    animate();
  </script>
</body>

</html>
